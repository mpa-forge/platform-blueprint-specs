name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-frontend.yml@main
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      working-directory: "."
      node-version: "24.13.1"
      bun-version: "1.3.11"
      test-command: "bun run test"
      sonar-organization-key: ""
      sonar-project-key: ""
