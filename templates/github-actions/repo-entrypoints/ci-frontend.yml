name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-frontend.yml@main
    with:
      working-directory: "."
      node-version: "24.13.1"
      bun-version: "1.3.11"
      test-command: "bun run test"
