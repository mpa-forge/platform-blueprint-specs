name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-contracts.yml@614c6bc602ee74329f93c7ce251c3df50cc09ae5
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      working-directory: "."
      go-version-file: "go.mod"
      node-version: "24.13.1"
      buf-version: "1.65.0"
      sonar-organization-key: ""
      sonar-project-key: ""
