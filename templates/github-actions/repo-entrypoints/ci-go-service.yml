name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-go.yml@e7433006b2ffe574d4518f7044e84082bab05e4d
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      working-directory: "."
      sonar-organization-key: ""
      sonar-project-key: ""
