name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-go.yml@d35b82c84761bcd09dbb48fdf552d58426ae3946
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      working-directory: "."
      sonar-organization-key: ""
      sonar-project-key: ""
