name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    uses: mpa-forge/.github/.github/workflows/reusable-ci-go.yml@4454175b41c288c2fe2052d84889336f3c3591b1
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      working-directory: "."
      sonar-organization-key: ""
      sonar-project-key: ""
