name: reusable-ci-frontend

on:
  workflow_call:
    inputs:
      working-directory:
        description: Repository path to run the workflow from.
        required: false
        type: string
        default: "."
      node-version:
        description: Node.js version to install for the frontend baseline.
        required: false
        type: string
        default: "24.13.1"
      bun-version:
        description: Bun version to install for the frontend baseline.
        required: false
        type: string
        default: "1.3.11"
      sonar-organization-key:
        description: SonarQube Cloud organization key.
        required: false
        type: string
        default: ""
      sonar-project-key:
        description: SonarQube Cloud project key for this repository.
        required: false
        type: string
        default: ""
      test-command:
        description: Repository-specific unit-test command.
        required: false
        type: string
        default: "bun test"
      toolchain-command:
        description: Baseline command used to prove the shared CI wiring is active.
        required: false
        type: string
        default: "make print-toolchain"
    secrets:
      GH_PACKAGES_TOKEN:
        description: GitHub Packages token used to install private scoped packages.
        required: false
      SONAR_TOKEN:
        description: SonarQube Cloud token used by the optional sonar job.
        required: false

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Print toolchain
        run: ${{ inputs.toolchain-command }}

      - name: Baseline note
        run: |
          echo "Phase 4 shared workflow baseline."
          echo "Later Phase 4 tasks add scan and artifact jobs."

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Cache Bun install artifacts
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ inputs.bun-version }}-

      - name: Configure npm authentication
        run: |
          npm config set --location=project @mpa-forge:registry https://npm.pkg.github.com
          npm config set --location=project //npm.pkg.github.com/:_authToken "${GH_PACKAGES_TOKEN}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Cache Bun install artifacts
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ inputs.bun-version }}-

      - name: Configure npm authentication
        run: |
          npm config set --location=project @mpa-forge:registry https://npm.pkg.github.com
          npm config set --location=project //npm.pkg.github.com/:_authToken "${GH_PACKAGES_TOKEN}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type-check
        run: bunx tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Cache Bun install artifacts
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ inputs.bun-version }}-

      - name: Configure npm authentication
        run: |
          npm config set --location=project @mpa-forge:registry https://npm.pkg.github.com
          npm config set --location=project //npm.pkg.github.com/:_authToken "${GH_PACKAGES_TOKEN}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: ${{ inputs.test-command }}

  sonar:
    name: sonar
    runs-on: ubuntu-latest
    needs:
      - lint
      - type-check
      - test
    if: inputs.sonar-organization-key != '' && inputs.sonar-project-key != ''
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Configure npm authentication
        run: |
          npm config set --location=project @mpa-forge:registry https://npm.pkg.github.com
          npm config set --location=project //npm.pkg.github.com/:_authToken "${GH_PACKAGES_TOKEN}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.organization=${{ inputs.sonar-organization-key }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.qualitygate.wait=true
