name: reusable-ci-go

on:
  workflow_call:
    inputs:
      working-directory:
        description: Repository path to run the workflow from.
        required: false
        type: string
        default: "."
      go-version-file:
        description: Go version file path relative to the working directory.
        required: false
        type: string
        default: "go.mod"
      golangci-lint-version:
        description: GolangCI-Lint version used by the lint job.
        required: false
        type: string
        default: "v1.64.8"
      sonar-organization-key:
        description: SonarQube Cloud organization key.
        required: false
        type: string
        default: ""
      sonar-project-key:
        description: SonarQube Cloud project key for this repository.
        required: false
        type: string
        default: ""
      toolchain-command:
        description: Baseline command used to prove the shared CI wiring is active.
        required: false
        type: string
        default: "make print-toolchain"
    secrets:
      SONAR_TOKEN:
        description: SonarQube Cloud token used by the optional sonar job.
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Print toolchain
        run: ${{ inputs.toolchain-command }}

      - name: Baseline note
        run: |
          echo "Phase 4 shared workflow baseline."
          echo "Later Phase 4 tasks add scan and artifact jobs."

  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Detect Go sources
        id: go-files
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "has_go_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GolangCI-Lint
        if: steps.go-files.outputs.has_go_files == 'true'
        env:
          GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION} run ./...

      - name: Run Go vet
        if: steps.go-files.outputs.has_go_files == 'true'
        run: go vet ./...

      - name: No Go sources
        if: steps.go-files.outputs.has_go_files != 'true'
        run: echo "No Go sources found; skipping lint."

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Detect Go sources
        id: go-files
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "has_go_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Go tests
        if: steps.go-files.outputs.has_go_files == 'true'
        run: go test ./...

      - name: No Go sources
        if: steps.go-files.outputs.has_go_files != 'true'
        run: echo "No Go sources found; skipping tests."

  sonar:
    name: sonar
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    if: inputs.sonar-organization-key != '' && inputs.sonar-project-key != ''
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.organization=${{ inputs.sonar-organization-key }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.qualitygate.wait=true
