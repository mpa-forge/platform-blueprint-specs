name: reusable-ci-go

on:
  workflow_call:
    inputs:
      working-directory:
        description: Repository path to run the workflow from.
        required: false
        type: string
        default: "."
      go-version-file:
        description: Go version file path relative to the working directory.
        required: false
        type: string
        default: "go.mod"
      toolchain-command:
        description: Baseline command used to prove the shared CI wiring is active.
        required: false
        type: string
        default: "make print-toolchain"

permissions:
  contents: read

jobs:
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Print toolchain
        run: ${{ inputs.toolchain-command }}

      - name: Baseline note
        run: |
          echo "P4-T01 starter baseline only."
          echo "Later Phase 4 tasks add lint, test, scan, and artifact jobs."
